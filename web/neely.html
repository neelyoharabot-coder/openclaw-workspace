<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat with Neely</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
      }
      #bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Crop out sides a bit; tune to your video framing. */
        object-position: center;
        filter: brightness(0.75);
      }

      /* Center overlay container */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 18px;
        text-align: center;
        color: #fff;
      }

      #btn {
        background: #ff7a00;
        color: #000;
        font-size: 18px;
        font-weight: 700;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }

      #status {
        max-width: 760px;
        padding: 10px 14px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      #email {
        color: #fff;
        font-weight: 600;
        text-decoration: underline;
        background: rgba(0, 0, 0, 0.35);
        padding: 8px 12px;
        border-radius: 12px;
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Background intro video. When it ends, the last frame stays visible. -->
    <video
      id="bg"
      src="NeelyIntro.mp4"
      autoplay
      muted
      playsinline
      preload="auto"
      onended="document.getElementById('bg').pause();"
    ></video>

    <div id="overlay">
      <button id="btn" type="button">Talk to Neely</button>
      <div id="status">Ready. Click “Talk to Neely” and speak.</div>
      <a id="email" href="mailto:NeelyOhara.Bot@Gmail.com">NeelyOhara.Bot@Gmail.com</a>
    </div>

    <!-- Keep audio playback internal; no controls needed -->
    <audio id="audio" controls autoplay></audio>

    <script type="module" src="neely.js"></script>
  </body>
</html>
